name: Security

on:
  push:
    branches: [main, codex/production-pwa]
  pull_request:
    branches: [main, codex/production-pwa]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # I-H4: scan all severity levels, not just HIGH; upload artifact for review.
      - run: |
          pip install bandit
          bandit -r apps -f json -o bandit-report.json || true
          bandit -r apps
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pip-audit
          # PYSEC-2025-183 / CVE-2025-45768: disputed pyjwt advisory about
          # "weak encryption" that flags every published version with no fix
          # available. The maintainer's response is that key length is the
          # application's choice and not a library defect. We use PyJWT only
          # with secrets generated from settings.SECRET_KEY (>= 50 chars,
          # enforced in config/settings/prod.py), so the alleged weakness
          # does not apply. Revisit if an upstream fix or scoped advisory
          # ships.
          pip-audit -r requirements/prod.txt --ignore-vuln PYSEC-2025-183

  dynamic-security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: moto
          POSTGRES_PASSWORD: moto
          POSTGRES_DB: moto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -r requirements/test.txt
      - run: |
          pytest tests/security -m security -q
        env:
          DATABASE_URL: postgres://moto:moto@localhost:5432/moto_test
          DJANGO_SETTINGS_MODULE: config.settings.test
