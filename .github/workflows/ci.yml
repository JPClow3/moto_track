name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # I-C4 / I-H1: enable buildx + GHA cache so subsequent builds reuse layers
      # instead of fetching Tailwind / pip wheels from scratch every time.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: moto-track-ci:${{ github.sha }}
          build-args: |
            REQUIREMENTS_FILE=prod.txt
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: moto
          POSTGRES_PASSWORD: moto
          POSTGRES_DB: moto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # I-L1: include the python version in the cache key so different runners
      # (linux/macos/windows) and python upgrades don't share stale wheel caches.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.12-pip-${{ hashFiles('requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-py3.12-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/test.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://moto:moto@localhost:5432/moto_test
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python manage.py migrate --noinput

      - name: Run deploy check
        env:
          DATABASE_URL: postgres://moto:moto@localhost:5432/moto_test
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        # I-C3: catch missing required env / settings *before* we waste a build.
        run: python manage.py check

      - name: Run tests
        env:
          DATABASE_URL: postgres://moto:moto@localhost:5432/moto_test
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        # I-H5: enforce branch coverage too, not just line coverage.
        run: |
          pytest tests/unit tests/integration tests/system tests/regression tests/performance tests/security \
            --cov=apps --cov-branch --cov-report=xml --cov-report=term -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
