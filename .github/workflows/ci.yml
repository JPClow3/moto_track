name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Check, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format Check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Svelte Check
        run: npm run check

      - name: Unit Tests
        run: npm run test:unit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: E2E Tests
        run: npm run test:e2e
        env:
          # Runtime needs DATABASE_URL (Neon Postgres) + PUBLIC_NEON_AUTH_URL/
          # NEON_AUTH_JWKS_URL (Neon Auth) to be set for routes that touch the
          # DB or auth; add them as repo/environment secrets here if/when the
          # e2e suite starts exercising those paths.
          CI: true

      - name: Production Build
        run: npm run build
