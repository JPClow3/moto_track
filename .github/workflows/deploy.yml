name: Legacy direct Lightsail deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-lightsail-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Legacy path notice
        run: |
          echo "This workflow is kept as a manual fallback."
          echo "Primary production deploys are expected to run through Dokploy on EC2."
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -eu

            cd ~/moto_track
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env --exclude=media/

            # Tag the build with the commit SHA so Sentry releases (and the
            # static-asset cache-buster in base.html) bucket by deploy
            # instead of the "local-dev" string sitting in .env. Computed
            # AFTER the git reset so it reflects the code actually deployed,
            # not just the SHA that triggered the workflow.
            export APP_BUILD_ID="$(git rev-parse HEAD)"
            echo "Deploying APP_BUILD_ID=${APP_BUILD_ID}"

            docker compose --profile prod --profile edge pull db caddy
            docker compose --profile prod --profile edge build --pull --no-cache web-prod

            docker compose --profile prod --profile edge down --remove-orphans
            docker compose --profile prod --profile edge up -d --force-recreate --remove-orphans
            docker compose --profile prod exec -T web-prod python manage.py check --deploy
            docker compose --profile prod --profile edge ps

            docker image prune -f
            docker builder prune -f || true
