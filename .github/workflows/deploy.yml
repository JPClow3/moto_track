name: Deploy to Lightsail

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: lightsail-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -eu

            cd ~/moto_track
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env --exclude=media/

            docker compose --profile prod --profile edge pull db caddy
            docker compose --profile prod --profile edge build --pull --no-cache web-prod

            docker compose --profile prod --profile edge down --remove-orphans
            docker compose --profile prod --profile edge up -d --force-recreate --remove-orphans
            docker compose --profile prod exec -T web-prod python manage.py check --deploy
            docker compose --profile prod --profile edge ps

            docker image prune -f
            docker builder prune -f || true
