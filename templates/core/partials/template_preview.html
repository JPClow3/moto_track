<article class="space-y-3" aria-label="Preview do template selecionado">
  <header class="flex items-start justify-between gap-3">
    <div>
      <p class="text-xs font-extrabold uppercase tracking-widest text-on-surface-variant">Template selecionado</p>
      <h4 class="text-lg font-bold tracking-tight">{{ template.brand|escape }} {{ template.model|escape }}{% if template.variant %} {{ template.variant|escape }}{% endif %}</h4>
      <p class="text-xs text-on-surface-variant">{{ year_label }} &bull; {{ template.engine_cc }} cc &bull; {{ template.country_code|escape }}</p>
    </div>
    <span class="severity-badge severity-success">Catálogo</span>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    <div class="rounded-xl bg-surface-lowest p-3 ring-1 ring-outline-variant/20">
      <p class="text-xs font-extrabold uppercase tracking-widest text-on-surface-variant">Combustível</p>
      <p class="text-sm font-semibold text-on-surface">{{ fuel }}</p>
    </div>
    <div class="rounded-xl bg-surface-lowest p-3 ring-1 ring-outline-variant/20">
      <p class="text-xs font-extrabold uppercase tracking-widest text-on-surface-variant">Óleo</p>
      <p class="text-sm font-semibold text-on-surface">{{ oil }}</p>
    </div>
  </div>
</article>
