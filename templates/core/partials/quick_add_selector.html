<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-add-title" data-quick-modal-backdrop>
  <div class="w-full sm:max-w-lg max-h-[90vh] overflow-auto rounded-t-2xl sm:rounded-2xl bg-surface-lowest p-6 shadow-ambient" role="document">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 id="quick-add-title" class="text-lg font-extrabold tracking-tight">Adicionar</h3>
        <p class="text-sm text-on-surface-variant mt-1">Escolha o que você quer registrar agora.</p>
      </div>
      <button type="button" class="h-10 w-10 grid place-items-center rounded-full text-on-surface-variant hover:bg-surface-low" onclick="window.closeQuickFormModal?.()" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div class="mt-6 grid grid-cols-1 gap-3">
      <a
        class="glass-card px-4 py-4 hover:translate-x-1 transition flex items-center justify-between gap-4"
        hx-get="{% url 'fuel:quick_create' %}?next={{ next_url|urlencode }}"
        hx-target="#quick-form-root"
        hx-swap="innerHTML"
      >
        <span class="flex items-center gap-4 min-w-0">
          <span class="icon-chip" aria-hidden="true"><i data-lucide="fuel"></i></span>
          <span class="min-w-0">
            <strong class="block font-extrabold truncate">Abastecimento</strong>
            <small class="block text-sm text-on-surface-variant truncate">Registro rápido</small>
          </span>
        </span>
        <i data-lucide="chevron-right" aria-hidden="true"></i>
      </a>

      <a
        class="glass-card px-4 py-4 hover:translate-x-1 transition flex items-center justify-between gap-4"
        hx-get="{% url 'maintenance:quick_create' %}?next={{ next_url|urlencode }}"
        hx-target="#quick-form-root"
        hx-swap="innerHTML"
      >
        <span class="flex items-center gap-4 min-w-0">
          <span class="icon-chip" aria-hidden="true"><i data-lucide="wrench"></i></span>
          <span class="min-w-0">
            <strong class="block font-extrabold truncate">Manutenção</strong>
            <small class="block text-sm text-on-surface-variant truncate">Preventiva ou corretiva</small>
          </span>
        </span>
        <i data-lucide="chevron-right" aria-hidden="true"></i>
      </a>

      <a class="glass-card px-4 py-4 hover:translate-x-1 transition flex items-center justify-between gap-4" href="{% url 'reminders:create' %}">
        <span class="flex items-center gap-4 min-w-0">
          <span class="icon-chip" aria-hidden="true"><i data-lucide="bell-ring"></i></span>
          <span class="min-w-0">
            <strong class="block font-extrabold truncate">Lembrete</strong>
            <small class="block text-sm text-on-surface-variant truncate">Por data, km ou intervalo</small>
          </span>
        </span>
        <i data-lucide="chevron-right" aria-hidden="true"></i>
      </a>

      <a class="glass-card px-4 py-4 hover:translate-x-1 transition flex items-center justify-between gap-4" href="{% url 'documents:list' %}#documents-upload-form">
        <span class="flex items-center gap-4 min-w-0">
          <span class="icon-chip" aria-hidden="true"><i data-lucide="file-up"></i></span>
          <span class="min-w-0">
            <strong class="block font-extrabold truncate">Documento</strong>
            <small class="block text-sm text-on-surface-variant truncate">Enviar e organizar</small>
          </span>
        </span>
        <i data-lucide="chevron-right" aria-hidden="true"></i>
      </a>
    </div>

    <div class="quick-actions-row pt-6">
      <button type="button" class="secondary-btn w-full" onclick="window.closeQuickFormModal?.()">Cancelar</button>
    </div>
  </div>
</div>
