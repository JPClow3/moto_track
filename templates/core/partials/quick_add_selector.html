<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-add-title" data-quick-modal-backdrop>
  <div class="w-full max-h-[90vh] overflow-auto rounded-t-md border border-outline-variant/20 bg-surface-low p-6 sm:max-w-lg sm:rounded-md" role="document">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 id="quick-add-title" class="text-lg font-semibold tracking-tight">Adicionar</h3>
        <p class="text-sm text-on-surface-variant mt-1">Escolha o que você quer registrar agora.</p>
      </div>
      <button type="button" class="ui-icon-btn !h-10 !w-10 !border-transparent !bg-transparent" @click="window.closeQuickFormModal?.()" aria-label="Fechar">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>

    <div class="mt-6 grid grid-cols-1 gap-3">
      <a
        class="flex items-center justify-between gap-4 rounded-md border border-outline-variant/20 bg-surface-low px-4 py-4 transition hover:bg-surface-high"
        hx-get="{% url 'fuel:quick_create' %}?next={{ next_url|urlencode }}"
        hx-target="#quick-form-root"
        hx-swap="innerHTML"
      >
        <span class="flex items-center gap-4 min-w-0">
          <i data-lucide="fuel" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
          <span class="min-w-0">
            <strong class="block font-semibold truncate">Abastecimento</strong>
            <small class="block text-sm text-on-surface-variant truncate">Registro rápido</small>
          </span>
        </span>
        <i data-lucide="chevron-right" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
      </a>

      <a
        class="flex items-center justify-between gap-4 rounded-md border border-outline-variant/20 bg-surface-low px-4 py-4 transition hover:bg-surface-high"
        hx-get="{% url 'maintenance:quick_create' %}?next={{ next_url|urlencode }}"
        hx-target="#quick-form-root"
        hx-swap="innerHTML"
      >
        <span class="flex items-center gap-4 min-w-0">
          <i data-lucide="wrench" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
          <span class="min-w-0">
            <strong class="block font-semibold truncate">Manutenção</strong>
            <small class="block text-sm text-on-surface-variant truncate">Preventiva ou corretiva</small>
          </span>
        </span>
        <i data-lucide="chevron-right" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
      </a>

      <a class="flex items-center justify-between gap-4 rounded-md border border-outline-variant/20 bg-surface-low px-4 py-4 transition hover:bg-surface-high" href="{% url 'reminders:create' %}">
        <span class="flex items-center gap-4 min-w-0">
          <i data-lucide="bell-ring" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
          <span class="min-w-0">
            <strong class="block font-semibold truncate">Lembrete</strong>
            <small class="block text-sm text-on-surface-variant truncate">Por data, km ou intervalo</small>
          </span>
        </span>
        <i data-lucide="chevron-right" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
      </a>

      <a class="flex items-center justify-between gap-4 rounded-md border border-outline-variant/20 bg-surface-low px-4 py-4 transition hover:bg-surface-high" href="{% url 'documents:list' %}#documents-upload-form">
        <span class="flex items-center gap-4 min-w-0">
          <i data-lucide="file-up" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
          <span class="min-w-0">
            <strong class="block font-semibold truncate">Documento</strong>
            <small class="block text-sm text-on-surface-variant truncate">Enviar e organizar</small>
          </span>
        </span>
        <i data-lucide="chevron-right" class="h-5 w-5 text-on-surface-variant shrink-0" aria-hidden="true"></i>
      </a>
    </div>

    <div class="quick-actions-row pt-6">
      <button type="button" class="secondary-btn w-full" @click="window.closeQuickFormModal?.()">Cancelar</button>
    </div>
  </div>
</div>
