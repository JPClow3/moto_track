{% if messages %}
<div class="fixed bottom-20 left-1/2 z-[60] w-[min(28rem,90%)] -translate-x-1/2 rounded-md border border-outline-variant/40 bg-inverse-surface px-4 py-3 text-sm text-on-primary shadow-lg" role="status" aria-live="polite">
  <div class="flex items-center justify-between gap-3">
    <div class="min-w-0">
      {% for message in messages %}
        <p class="truncate">{{ message }}</p>
      {% endfor %}
    </div>
    {% if snackbar_undo %}
      <form method="post" action="{% url 'undo_action' snackbar_undo.token %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.path }}" />
        <button class="rounded-md bg-on-primary px-3 py-2 text-xs font-semibold text-inverse-surface" type="submit">
          Desfazer
        </button>
      </form>
    {% endif %}
  </div>
</div>
{% endif %}
