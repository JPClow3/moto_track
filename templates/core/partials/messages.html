{% if messages %}
<div class="snackbar" role="status" aria-live="polite" data-auto-dismiss-toast>
  <div class="flex items-center justify-between gap-3">
    <div class="min-w-0">
      {% for message in messages %}
        <p class="truncate">{{ message }}</p>
      {% endfor %}
    </div>
    {% if snackbar_undo %}
      <form method="post" action="{% url 'undo_action' snackbar_undo.token %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.path }}" />
        <button class="rounded-md bg-on-primary px-3 py-2 text-xs font-semibold text-inverse-surface" type="submit">
          Desfazer
        </button>
      </form>
    {% endif %}
  </div>
</div>
{% endif %}
