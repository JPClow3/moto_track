{% load crispy_forms_tags %}

<div class="quick-overlay" role="dialog" aria-modal="true" aria-labelledby="quick-odometer-title">
  <div class="quick-panel" role="document">
    <div class="quick-head">
      <h3 id="quick-odometer-title">{{ title }}</h3>
      <button type="button" class="text-button" onclick="this.closest('#quick-form-root').innerHTML=''">Fechar</button>
    </div>

    <form
      method="post"
      class="data-form"
      hx-post="{% url 'quick_odometer_update' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form|crispy }}

      <div class="quick-actions-row">
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
