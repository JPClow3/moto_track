{% load crispy_forms_tags %}

<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-odometer-title" data-quick-modal-backdrop>
  <div class="w-full max-h-[90vh] overflow-auto rounded-t-md border border-outline-variant/20 bg-surface-low p-6 sm:max-w-xl sm:rounded-md" role="document">
    <div class="flex items-start justify-between gap-4">
      <h3 id="quick-odometer-title" class="text-lg font-semibold tracking-tight">{{ title }}</h3>
      <button type="button" class="secondary-btn" @click="closeQuickFormModal()">Fechar</button>
    </div>

    <form
      method="post"
      class="mt-6 data-form"
      hx-post="{% url 'quick_odometer_update' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form|crispy }}

      <div class="quick-actions-row">
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
