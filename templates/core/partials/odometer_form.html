{% load crispy_forms_tags %}

<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-odometer-title">
  <div class="w-full sm:max-w-xl max-h-[90vh] overflow-auto rounded-t-2xl sm:rounded-2xl bg-surface-lowest p-6 shadow-ambient" role="document">
    <div class="flex items-start justify-between gap-4">
      <h3 id="quick-odometer-title" class="text-lg font-extrabold tracking-tight">{{ title }}</h3>
      <button type="button" class="rounded-full bg-surface-lowest px-4 py-2 text-sm font-bold text-on-surface shadow-ambient hover:bg-surface-highest/60" onclick="this.closest('#quick-form-root').innerHTML=''">Fechar</button>
    </div>

    <form
      method="post"
      class="mt-6 space-y-4"
      hx-post="{% url 'quick_odometer_update' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form|crispy }}

      <button type="submit" class="rounded-2xl bg-gradient-to-br from-primary to-primary-dim px-6 py-3 text-[11px] font-extrabold uppercase tracking-widest text-on-primary shadow-ambient">{{ submit_label }}</button>
    </form>
  </div>
</div>
