<div class="quick-overlay" role="dialog" aria-modal="true" aria-labelledby="quick-odometer-title" tabindex="-1">
  <div class="quick-panel" role="document">
    <div class="quick-head">
      <h3 id="quick-odometer-title">{{ title }}</h3>
      <button type="button" class="text-button" data-close-quick-form>Fechar</button>
    </div>

    <form
      method="post"
      class="data-form"
      hx-post="{% url 'quick_odometer_update' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />

      {% if form.non_field_errors %}
        <div class="form-errors" aria-live="polite">
          {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      {% for field in form.visible_fields %}
        <div class="form-field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="field-error" aria-live="polite">
              {% for error in field.errors %}
                <p>{{ error }}</p>
              {% endfor %}
            </div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="quick-actions-row">
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
