{% load crispy_forms_tags %}

<div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="quick-odometer-title" data-quick-modal-backdrop>
  <div class="modal-panel sm:max-w-xl" role="document">
    <div class="flex items-start justify-between gap-4">
      <h3 id="quick-odometer-title" class="text-lg font-semibold tracking-tight">{{ title }}</h3>
      <button type="button" class="secondary-btn" @click="closeQuickFormModal()">Fechar</button>
    </div>

    <form
      method="post"
      class="mt-6 data-form"
      data-offline-queue="quick_odometer_update"
      hx-post="{% url 'quick_odometer_update' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      <input type="hidden" name="client_submission_id" value="{{ client_submission_id }}" />
      {{ form|crispy }}

      <div class="quick-actions-row">
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
