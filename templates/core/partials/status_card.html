{% comment %}
Reusable dashboard status card.
Expected context: card { icon, badge, title, value, meta, tone? }
{% endcomment %}

<div class="space-y-2" role="listitem">
  <div class="flex items-center justify-between gap-4">
    <p class="text-xs font-medium text-on-surface-variant">{{ card.title }}</p>
    <span class="severity-badge {% if card.tone == 'warning' %}severity-warning{% elif card.tone == 'info' %}severity-info{% elif card.tone == 'success' or card.tone == 'good' %}severity-success{% elif card.tone == 'error' or card.tone == 'danger' %}severity-critical{% else %}severity-neutral{% endif %}">
      {{ card.badge }}
    </span>
  </div>
  <p class="font-headline text-3xl font-semibold tracking-tight text-on-surface">{{ card.value }}</p>
  <p class="text-sm text-on-surface-variant">{{ card.meta|capfirst }}</p>
</div>
