{% comment %}
Reusable dashboard status card.
Expected context: card { icon, badge, title, value, meta, tone? }
{% endcomment %}

<article class="group glass-card-tight p-6 {% if card.tone == 'warning' %}group-hover:ring-warning/20{% elif card.tone == 'info' %}group-hover:ring-info/20{% elif card.tone == 'success' or card.tone == 'good' %}group-hover:ring-success/20{% elif card.tone == 'error' or card.tone == 'danger' %}group-hover:ring-error/20{% else %}group-hover:ring-primary/20{% endif %}" role="listitem">
  <div class="glass-orb {% if card.tone == 'warning' %}tone-orb-warning{% elif card.tone == 'info' %}tone-orb-info{% elif card.tone == 'success' or card.tone == 'good' %}tone-orb-success{% elif card.tone == 'error' or card.tone == 'danger' %}tone-orb-error{% else %}tone-orb-primary{% endif %} opacity-70 group-hover:opacity-90 group-hover:-translate-y-1 group-hover:translate-x-1 transition"></div>

  <div class="relative flex items-start justify-between gap-4">
    <div class="icon-chip group-hover:bg-surface-highest/60 transition" aria-hidden="true">
      <i data-lucide="{{ card.icon }}"></i>
    </div>
    <span class="rounded-full bg-surface-low/70 backdrop-blur px-3 py-1 text-[10px] font-extrabold uppercase tracking-widest text-on-surface-variant ring-1 ring-outline-variant/20">
      {{ card.badge }}
    </span>
  </div>

  <div class="relative mt-5">
    <h3 class="text-sm font-semibold text-on-surface-variant">{{ card.title }}</h3>
    <p class="mt-2 text-3xl font-extrabold tracking-tight">{{ card.value }}</p>
    <p class="mt-1 text-sm text-on-surface-variant">{{ card.meta|capfirst }}</p>
  </div>
</article>
