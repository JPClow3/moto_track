{% load crispy_forms_tags %}

<div class="quick-overlay" role="dialog" aria-modal="true" aria-labelledby="quick-fuel-title">
  <div class="quick-panel" role="document">
    <div class="quick-head">
      <div>
        <h3 id="quick-fuel-title">{{ title }}</h3>
        <p>Registre o abastecimento e mantenha seu histórico atualizado.</p>
      </div>
      <button type="button" class="quick-close" onclick="window.closeQuickFormModal?.()" aria-label="Fechar formulário">
        <i data-lucide="x"></i>
      </button>
    </div>

    <form
      method="post"
      class="data-form quick-form-grid"
      hx-post="{% url 'fuel:quick_create' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form|crispy }}

      <div class="quick-actions-row-split">
        <button type="button" class="secondary-btn" onclick="window.closeQuickFormModal?.()">Cancelar</button>
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
