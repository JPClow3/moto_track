{% load crispy_forms_tags %}

<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-fuel-title">
  <div class="w-full sm:max-w-3xl max-h-[90vh] overflow-auto rounded-t-2xl sm:rounded-2xl bg-surface-lowest p-6 shadow-ambient" role="document">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 id="quick-fuel-title" class="text-lg font-extrabold tracking-tight">{{ title }}</h3>
        <p class="text-sm text-on-surface-variant mt-1">Registre o abastecimento e mantenha seu histórico atualizado.</p>
      </div>
      <button type="button" class="h-10 w-10 grid place-items-center rounded-full text-on-surface-variant hover:bg-surface-low" onclick="window.closeQuickFormModal?.()" aria-label="Fechar formulário">
        <i data-lucide="x"></i>
      </button>
    </div>

    <form
      method="post"
      class="mt-6 space-y-4"
      hx-post="{% url 'fuel:quick_create' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form|crispy }}

      <div class="flex flex-col-reverse sm:flex-row sm:justify-between gap-3 pt-2">
        <button type="button" class="rounded-2xl bg-surface-low px-6 py-3 text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant hover:bg-surface-highest/60" onclick="window.closeQuickFormModal?.()">Cancelar</button>
        <button type="submit" class="rounded-2xl bg-gradient-to-br from-primary to-primary-dim px-6 py-3 text-[11px] font-extrabold uppercase tracking-widest text-on-primary shadow-ambient">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
