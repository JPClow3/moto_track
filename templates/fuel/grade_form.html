{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - Moto Track{% endblock %}

{% block content %}
<section class="list-section" aria-labelledby="grade-form-title">
  <header class="list-header">
    <div>
      <h2 id="grade-form-title">{{ title }}</h2>
      <p class="section-subtitle">Cadastre combustíveis para reutilizar tipo, octanagem e preço médio.</p>
    </div>
    <a class="inline-cta" href="{% url 'fuel:catalogs' %}">Voltar ao catálogo</a>
  </header>

  <article class="panel">
    <form method="post" class="data-form" novalidate>
      {% csrf_token %}
      {{ form|crispy }}
      <div class="quick-actions-row-split">
        <a class="secondary-btn" href="{% url 'fuel:catalogs' %}">Cancelar</a>
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
