{% extends 'base.html' %}

{% block title %}Excluir combustível - Moto Track{% endblock %}

{% block content %}
<section class="list-section" aria-labelledby="delete-grade-title">
  <header class="list-header">
    <div>
      <h2 id="delete-grade-title">Excluir combustível</h2>
      <p class="section-subtitle">Esta ação não pode ser desfeita.</p>
    </div>
  </header>

  <article class="panel">
    <p>Tem certeza que deseja excluir <strong>{{ grade.name }}</strong>?</p>
    <form method="post" class="data-form">
      {% csrf_token %}
      <div class="quick-actions-row-split">
        <a class="secondary-btn" href="{% url 'fuel:catalogs' %}">Cancelar</a>
        <button type="submit" class="primary-btn">Excluir</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
