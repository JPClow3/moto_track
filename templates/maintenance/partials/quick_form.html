{% load crispy_forms_tags %}

<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-maintenance-title" data-quick-modal-backdrop>
  <div class="w-full max-h-[90vh] overflow-auto rounded-t-md border border-outline-variant/20 bg-surface-low p-6 sm:max-w-3xl sm:rounded-md" role="document">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 id="quick-maintenance-title" class="text-lg font-semibold tracking-tight">{{ title }}</h3>
        <p class="text-sm text-on-surface-variant mt-1">Inclua serviços com custo, odômetro e observações em poucos passos.</p>
      </div>
      <button type="button" class="ui-icon-btn !h-10 !w-10 !border-transparent !bg-transparent" @click="closeQuickFormModal()" aria-label="Fechar formulário">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>

    <form
      method="post"
      enctype="multipart/form-data"
      class="mt-6 data-form"
      data-offline-queue="maintenance:quick_create"
      hx-post="{% url 'maintenance:quick_create' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      <input type="hidden" name="client_submission_id" value="{{ client_submission_id }}" />
      {{ form.media }}
      {{ form|crispy }}

      <div class="quick-actions-row-split">
        <button type="button" class="secondary-btn" @click="closeQuickFormModal()">Cancelar</button>
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
