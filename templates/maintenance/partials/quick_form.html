{% load crispy_forms_tags %}

<div class="fixed inset-0 z-50 grid place-items-end sm:place-items-center bg-inverse-surface/60 p-0 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="quick-maintenance-title">
  <div class="w-full sm:max-w-3xl max-h-[90vh] overflow-auto rounded-t-2xl sm:rounded-2xl bg-surface-lowest p-6 shadow-ambient" role="document">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 id="quick-maintenance-title" class="text-lg font-extrabold tracking-tight">{{ title }}</h3>
        <p class="text-sm text-on-surface-variant mt-1">Inclua serviços com custo, odômetro e observações em poucos passos.</p>
      </div>
      <button type="button" class="h-10 w-10 grid place-items-center rounded-full text-on-surface-variant hover:bg-surface-low" onclick="window.closeQuickFormModal?.()" aria-label="Fechar formulário">
        <i data-lucide="x"></i>
      </button>
    </div>

    <form
      method="post"
      class="mt-6 data-form"
      hx-post="{% url 'maintenance:quick_create' %}"
      hx-target="#quick-form-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      {{ form.media }}
      {{ form|crispy }}

      <div class="quick-actions-row-split">
        <button type="button" class="secondary-btn" onclick="window.closeQuickFormModal?.()">Cancelar</button>
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </div>
</div>
