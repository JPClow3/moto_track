{% comment %}
U-M7: HTMX loading skeleton for list views.

   Usage inside a list view template:
     <c-list-skeleton rows="5" />

   Wire as the indicator for an htmx swap:
     <div hx-get="..." hx-target="..." hx-indicator="#list-skel">
     <c-list-skeleton id="list-skel" rows="6" />
   </div>
{% endcomment %}
<div id="{{ id|default:'list-skeleton' }}"
     class="htmx-indicator space-y-3"
     role="status"
     aria-live="polite"
     aria-label="{{ aria_label|default:'Carregando lista' }}">
  {% for _ in ""|ljust:rows|default_if_none:"5" %}
    <div class="flex items-center gap-4 rounded-lg border border-outline-variant/40 bg-surface-low/40 p-4">
      <div class="skeleton-shimmer h-10 w-10 rounded-full"></div>
      <div class="flex-1 space-y-2">
        <div class="skeleton-shimmer h-4 w-1/3 rounded"></div>
        <div class="skeleton-shimmer h-3 w-1/2 rounded"></div>
      </div>
      <div class="skeleton-shimmer h-6 w-16 rounded"></div>
    </div>
  {% endfor %}
</div>
