{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Entrar - Moto Track{% endblock %}

{% block content %}
<section aria-labelledby="login-title" class="auth-section">
  <h2 id="login-title">Entrar</h2>
  <p class="section-subtitle">Use sua conta para acessar os dados da moto.</p>

  <form method="post" novalidate class="auth-form">
    {% csrf_token %}
    {{ form|crispy }}

    <div class="quick-actions-row-split">
      <a class="secondary-btn" href="{% url 'account_reset_password' %}">Esqueci a senha</a>
      <button type="submit" class="primary-btn">Entrar</button>
    </div>
  </form>
</section>
{% endblock %}
