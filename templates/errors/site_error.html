{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" class="h-full" data-theme="system">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>{{ status_code }} - Moto Track</title>
  <link rel="icon" href="{% static 'brand/favicon.ico' %}" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'brand/favicon-32x32.png' %}" />
  <link rel="stylesheet" href="{% static 'css/tailwind.generated.css' %}" />
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="min-h-screen bg-surface text-on-surface antialiased">
  <main class="mx-auto flex min-h-screen w-[min(760px,92%)] items-center justify-center py-10">
    <section class="panel w-full p-8 md:p-10">
      <p class="metric-card-label">Status {{ status_code }}</p>
      <h1 class="mt-3 font-headline text-4xl font-semibold tracking-tight text-on-surface">{{ title }}</h1>
      <p class="mt-4 text-sm leading-7 text-on-surface-variant">{{ message }}</p>
      <p class="mt-5 text-xs leading-6 text-on-surface-variant">
        Caminho: <code class="rounded bg-surface-low px-2 py-1">{{ path }}</code>
      </p>
      {% if request_id %}
        <p class="mt-2 text-xs leading-6 text-on-surface-variant">
          Request ID: <code class="rounded bg-surface-low px-2 py-1">{{ request_id }}</code>
        </p>
      {% endif %}
      <div class="mt-7 flex flex-wrap gap-3">
        <a class="ui-btn-primary" href="{% url 'landing' %}">Voltar ao início</a>
        <a class="ui-btn-secondary" href="{% url 'account_login' %}">Ir para login</a>
      </div>
    </section>
  </main>
</body>
</html>
