{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - Moto Track{% endblock %}

{% block content %}
<section class="list-section" aria-labelledby="garage-form-title">
  <header class="list-header">
    <div>
      <h2 id="garage-form-title">{{ title }}</h2>
      <p class="section-subtitle">Preencha os dados da moto para manter os registros organizados.</p>
    </div>
    <a class="inline-cta" href="{% url 'garage:list' %}">Voltar para garagem</a>
  </header>

  <article class="panel">
    <form method="post" class="data-form" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      {{ form|crispy }}

      <div class="quick-actions-row-split">
        <a class="secondary-btn" href="{% url 'garage:list' %}">Cancelar</a>
        <button type="submit" class="primary-btn">{{ submit_label }}</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
