services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: motoapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in Coolify env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      # Coolify routes to the container port you expose; keep it explicit.
      PORT: "8000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/motoapp
      # Required by prod settings (django-storages → S3 for default file storage).
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:?AWS_STORAGE_BUCKET_NAME_required}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      # Optional: omit to use IAM role / instance profile on AWS; else set keys in Coolify secrets.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      # Hostnames served (Coolify public domain, comma-separated IP if needed).
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS_required}

      # Optional local fallback path for `MEDIA_ROOT` (S3 is used for FileField storage in prod).
      RAILWAY_VOLUME_MOUNT_PATH: /data
    volumes:
      - media_data:/data/media
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:

