repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-django
        args: ["--reformat", "--quiet"]

  # I-M5: type-check new code. Run in --ignore-missing-imports mode so we don't
  # block on third-party stubs that don't exist. Files-only so it stays fast.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        files: ^apps/
        additional_dependencies:
          - django-stubs>=5.0
          - djangorestframework-stubs>=3.15
        args: ["--ignore-missing-imports", "--no-strict-optional", "--check-untyped-defs"]
        exclude: ^apps/.*/migrations/

  # I-L5: catch repo-leakage patterns (e.g. accidental log/sqlite check-ins)
  # and reject obvious secrets before commit.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=512"]
