name: moto_track

# Cap container stdout/stderr so the host disk can't be filled by a single
# misbehaving service. 10 MB per file × 3 files = 30 MB ceiling per container.
# Applied via YAML anchor on every service that produces logs.
x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-db: &db_common
  image: postgres:16
  environment:
    POSTGRES_DB: ${POSTGRES_DB:-motoapp}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
  # Postgres tuning: the upstream image ships extremely conservative defaults
  # (shared_buffers=128MB) so a 2-4 GB VPS leaves most of its RAM on the table.
  # Override via env vars in your .env when you know the host size, e.g.:
  #   POSTGRES_SHARED_BUFFERS=512MB
  #   POSTGRES_EFFECTIVE_CACHE_SIZE=1536MB
  #   POSTGRES_WORK_MEM=16MB
  # Leaving the values blank means "keep the upstream defaults" — safe.
  command:
    - postgres
    - -c
    - shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
    - -c
    - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
    - -c
    - work_mem=${POSTGRES_WORK_MEM:-4MB}
    - -c
    - max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  restart: unless-stopped
  logging: *default_logging
  deploy:
    resources:
      limits:
        memory: ${DB_MEMORY_LIMIT:-1g}
  volumes:
    - postgres_data:/var/lib/postgresql/data

x-web: &web_common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
    CELERY_BROKER_URL: redis://redis:6379/0
    VOLUME_MOUNT_PATH: ${VOLUME_MOUNT_PATH:-/app}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped
  logging: *default_logging
  user: "1000:1000"

services:
  db:
    <<: *db_common

  redis:
    image: redis:7-alpine
    # Bound Redis memory so a runaway cache key can't OOM-kill the host.
    # `allkeys-lru` makes Redis behave correctly as a cache when it fills up
    # (drop the least-recently-used keys instead of refusing writes).
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
    profiles: ["dev", "prod", "test", "migrate"]
    restart: unless-stopped
    logging: *default_logging
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-384m}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    <<: *web_common
    command: python manage.py runserver 0.0.0.0:8000
    profiles: ["dev"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  celery-worker:
    <<: *web_common
    command: celery -A config worker --loglevel=INFO
    profiles: ["dev"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  celery-beat:
    <<: *web_common
    command: celery -A config beat --loglevel=INFO
    profiles: ["dev"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  web-prod:
    <<: *web_common
    # I-C1: migrate via a one-shot side-car (see `migrate` service) so a slow
    # migration doesn't block the boot of every replica. The CMD here only
    # ensures admin + boots gunicorn.
    # I-H2: workers/threads come from env so capacity tuning doesn't require a
    # compose rebuild.
    # PROMETHEUS_MULTIPROC_DIR + the rm/mkdir prelude make django-prometheus
    # safe under gunicorn's pre-fork model. Each worker writes its counters to
    # the shared dir and the /metrics endpoint aggregates across the whole
    # pool. Without it, scrapes see one worker at random and counts drift.
    command: >
      sh -c "
        rm -rf /tmp/prometheus_multiproc && mkdir -p /tmp/prometheus_multiproc &&
        python manage.py ensure_admin &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers ${GUNICORN_WORKERS:-3}
          --threads ${GUNICORN_THREADS:-4}
          --timeout ${GUNICORN_TIMEOUT:-60}
          --forwarded-allow-ips='*'
          --access-logfile -
          --error-logfile -
      "
    profiles: ["prod"]
    # `service_completed_successfully` makes web-prod wait for the migrate
    # sidecar to finish before booting. With this in place we can scale
    # web-prod to N replicas — every replica still sees an already-migrated
    # schema, instead of racing each other on `manage.py migrate` and
    # deadlocking.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${WEB_MEMORY_LIMIT:-1g}
    volumes:
      # MEDIA: with `STORAGES["default"]` = S3 in prod, uploads go to S3; this
      # volume is only a local fallback (e.g. exports or a storage override).
      # Keep it as a named volume so Dokploy and plain Compose don't depend on
      # repo-relative bind mounts for persistence. The target mirrors
      # VOLUME_MOUNT_PATH so Django's MEDIA_ROOT and the volume stay aligned.
      - type: volume
        source: media_data
        target: ${VOLUME_MOUNT_PATH:-/app}/media
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      # OTel exporter target. Empty by default so `config/otel.py` skips
      # trace setup when no collector is running. Set in .env to enable:
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318   (with observability profile)
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://host:4318    (external collector)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-moto-track-web}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      # Release identifier surfaced to Sentry (and used as the static-asset
      # cache-buster in base.html). Default "dev" is fine for local; the
      # GitHub Deploy workflow exports the commit SHA before `docker compose
      # up` so production releases bucket by commit instead of "local-dev".
      APP_BUILD_ID: ${APP_BUILD_ID:-dev}

  celery-worker-prod:
    <<: *web_common
    command: celery -A config worker --loglevel=INFO
    profiles: ["prod"]
    # Workers also depend on migrations completing — a worker that wakes up
    # against an unmigrated DB raises confusing OperationalErrors.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${CELERY_WORKER_MEMORY_LIMIT:-768m}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      # OTel exporter target. Empty by default so `config/otel.py` skips
      # trace setup when no collector is running. Set in .env to enable:
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318   (with observability profile)
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://host:4318    (external collector)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_WORKER:-moto-track-worker}
      APP_BUILD_ID: ${APP_BUILD_ID:-dev}

  celery-beat-prod:
    <<: *web_common
    command: celery -A config beat --loglevel=INFO
    profiles: ["prod"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${CELERY_BEAT_MEMORY_LIMIT:-256m}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      # OTel exporter target. Empty by default so `config/otel.py` skips
      # trace setup when no collector is running. Set in .env to enable:
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318   (with observability profile)
      #   OTEL_EXPORTER_OTLP_ENDPOINT=http://host:4318    (external collector)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_BEAT:-moto-track-beat}
      APP_BUILD_ID: ${APP_BUILD_ID:-dev}

  # I-C1: dedicated migration step. Run with: `docker compose --profile prod run --rm migrate`
  # DATABASE_URL mirrors the web-prod fallback expression: when the deployment
  # supplies an external DATABASE_URL (managed Postgres, Railway, RDS, etc.)
  # the migrate sidecar must target that same database, not the bundled `db`
  # service. Otherwise we'd migrate the wrong schema and the app would boot
  # against an unmigrated database. (Codex P1.)
  migrate:
    <<: *web_common
    command: ["python", "manage.py", "migrate", "--noinput"]
    profiles: ["prod", "migrate"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: "no"

  test:
    <<: *web_common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: test.txt
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        pytest tests/unit tests/integration tests/system tests/regression tests/performance tests/security -q
      "
    profiles: ["test"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-test-secret-key}

  caddy:
    image: caddy:2.10-alpine
    profiles: ["edge"]
    depends_on:
      web-prod:
        condition: service_healthy
    restart: unless-stopped
    logging: *default_logging
    deploy:
      resources:
        limits:
          memory: ${CADDY_MEMORY_LIMIT:-128m}
    # I-M1: Caddy can be UP while still reloading its config; healthcheck so
    # orchestrators don't route traffic prematurely.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # ---------------------------------------------------------------------------
  # Observability stack (profile: "observability")
  #
  # Optional — add alongside prod for full metrics/logs/traces:
  #   docker compose --profile prod --profile observability up -d
  #
  # Alloy scrapes Prometheus targets, tails container stdout for Loki,
  # receives OTLP traces, and remote-writes to Grafana Cloud.
  # Sentry is separate (SENTRY_DSN env var in the Django app).
  #
  # Requires (in .env):
  #   GRAFANA_CLOUD_PROM_URL, GRAFANA_CLOUD_PROM_USER,
  #   GRAFANA_CLOUD_LOKI_URL, GRAFANA_CLOUD_LOKI_USER,
  #   GRAFANA_CLOUD_TEMPO_URL, GRAFANA_CLOUD_TEMPO_USER,
  #   GRAFANA_CLOUD_API_KEY  (single Access Policy token, all three scopes)
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.5.1
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default_logging
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./deploy/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      # Tail container stdout via the docker socket. Read-only mount is enough
      # because Alloy only reads logs and discovers containers, never writes.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Use empty defaults so a host that doesn't ship Grafana Cloud secrets
      # can still parse this compose file for non-observability profiles
      # (`prod`, `edge`, etc.). Docker Compose evaluates env interpolation
      # for every service regardless of `profiles:` filtering, so the prior
      # `${VAR:?error}` form broke `docker compose up` on hosts running only
      # the prod profile. Alloy itself surfaces missing values at startup
      # when the `observability` profile is activated, which is the right
      # failure surface for misconfigured observability.
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL:-}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
      GRAFANA_CLOUD_TEMPO_URL: ${GRAFANA_CLOUD_TEMPO_URL:-}
      GRAFANA_CLOUD_TEMPO_USER: ${GRAFANA_CLOUD_TEMPO_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      DEPLOY_ENV: ${SENTRY_ENVIRONMENT:-production}
    deploy:
      resources:
        limits:
          memory: ${ALLOY_MEMORY_LIMIT:-200m}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default_logging
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: ""
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${PG_EXPORTER_MEMORY_LIMIT:-64m}

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default_logging
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: ${REDIS_EXPORTER_MEMORY_LIMIT:-48m}

  celery-exporter:
    image: danihodovic/celery-exporter:0.10.13
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default_logging
    environment:
      CE_BROKER_URL: redis://redis:6379/0
      CE_ACCEPT_CONTENT: json
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: ${CELERY_EXPORTER_MEMORY_LIMIT:-96m}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default_logging
    # cAdvisor reads the host's container runtime metadata. The mounts below
    # are the minimum read-only set required for Docker on a standard Linux
    # host. `privileged: true` is required for /proc and cgroup inspection.
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: ${CADVISOR_MEMORY_LIMIT:-200m}

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
  alloy_data:
