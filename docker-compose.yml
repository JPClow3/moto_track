name: moto_track

x-db: &db_common
  image: postgres:16
  environment:
    POSTGRES_DB: ${POSTGRES_DB:-motoapp}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  restart: unless-stopped
  volumes:
    - postgres_data:/var/lib/postgresql/data

x-web: &web_common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped
  user: "1000:1000"

services:
  db:
    <<: *db_common

  web:
    <<: *web_common
    command: python manage.py runserver 0.0.0.0:8000
    profiles: ["dev"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  web-prod:
    <<: *web_common
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py ensure_admin &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --timeout 60 --forwarded-allow-ips='*'
      "
    profiles: ["prod"]
    volumes:
      # MEDIA: with `STORAGES["default"]` = S3 in prod, uploads go to S3; this mount is optional
      # (e.g. local exports or if you override storage). Safe to remove on Lightsail when using S3 only.
      - ./media:/app/media
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"

  test:
    <<: *web_common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: test.txt
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        pytest tests/unit tests/integration tests/system tests/regression tests/performance tests/security -q
      "
    profiles: ["test"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-test-secret-key}

  caddy:
    image: caddy:2.10-alpine
    profiles: ["edge"]
    depends_on:
      web-prod:
        condition: service_started
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
