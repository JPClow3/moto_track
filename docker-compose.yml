name: moto_track

x-db: &db_common
  image: postgres:16
  environment:
    POSTGRES_DB: ${POSTGRES_DB:-motoapp}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  restart: unless-stopped
  volumes:
    - postgres_data:/var/lib/postgresql/data

x-web: &web_common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped
  user: "1000:1000"

services:
  db:
    <<: *db_common

  web:
    <<: *web_common
    command: python manage.py runserver 0.0.0.0:8000
    profiles: ["dev"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  web-prod:
    <<: *web_common
    command: sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --timeout 60"
    profiles: ["prod"]
    volumes:
      # MEDIA: with `STORAGES["default"]` = S3 in prod, uploads go to S3; this mount is optional
      # (e.g. local exports or if you override storage). Safe to remove on Lightsail when using S3 only.
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?missing_DJANGO_SECRET_KEY}
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      DJANGO_USE_HTTPS: ${DJANGO_USE_HTTPS:-false}
      ACCOUNT_EMAIL_VERIFICATION: "mandatory"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:?missing_AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

volumes:
  postgres_data:
