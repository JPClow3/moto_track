name: moto_track

x-db: &db_common
  image: postgres:16
  environment:
    POSTGRES_DB: ${POSTGRES_DB:-motoapp}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  restart: unless-stopped
  volumes:
    - postgres_data:/var/lib/postgresql/data

x-web: &web_common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
    CELERY_BROKER_URL: redis://redis:6379/0
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped
  user: "1000:1000"

services:
  db:
    <<: *db_common

  redis:
    image: redis:7-alpine
    profiles: ["dev", "prod", "test"]
    restart: unless-stopped

  web:
    <<: *web_common
    command: python manage.py runserver 0.0.0.0:8000
    profiles: ["dev"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  celery-worker:
    <<: *web_common
    command: celery -A config worker --loglevel=INFO
    profiles: ["dev"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  celery-beat:
    <<: *web_common
    command: celery -A config beat --loglevel=INFO
    profiles: ["dev"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"

  web-prod:
    <<: *web_common
    # I-C1: migrate via a one-shot side-car (see `migrate` service) so a slow
    # migration doesn't block the boot of every replica. The CMD here only
    # ensures admin + boots gunicorn.
    # I-H2: workers/threads come from env so capacity tuning doesn't require a
    # compose rebuild.
    command: >
      sh -c "
        python manage.py ensure_admin &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers ${GUNICORN_WORKERS:-3}
          --threads ${GUNICORN_THREADS:-4}
          --timeout ${GUNICORN_TIMEOUT:-60}
          --forwarded-allow-ips='*'
          --access-logfile -
          --error-logfile -
      "
    profiles: ["prod"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${WEB_MEMORY_LIMIT:-1g}
    volumes:
      # MEDIA: with `STORAGES["default"]` = S3 in prod, uploads go to S3; this mount is optional
      # (e.g. local exports or if you override storage). Safe to remove on Lightsail when using S3 only.
      - ./media:/app/media
      - ./.env:/app/.env:ro
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"

  celery-worker-prod:
    <<: *web_common
    command: celery -A config worker --loglevel=INFO
    profiles: ["prod"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"

  celery-beat-prod:
    <<: *web_common
    command: celery -A config beat --loglevel=INFO
    profiles: ["prod"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"

  # I-C1: dedicated migration step. Run with: `docker compose --profile prod run --rm migrate`
  # DATABASE_URL mirrors the web-prod fallback expression: when the deployment
  # supplies an external DATABASE_URL (managed Postgres, Railway, RDS, etc.)
  # the migrate sidecar must target that same database, not the bundled `db`
  # service. Otherwise we'd migrate the wrong schema and the app would boot
  # against an unmigrated database. (Codex P1.)
  migrate:
    <<: *web_common
    command: ["python", "manage.py", "migrate", "--noinput"]
    profiles: ["prod", "migrate"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}}
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: "no"

  test:
    <<: *web_common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: test.txt
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        pytest tests/unit tests/integration tests/system tests/regression tests/performance tests/security -q
      "
    profiles: ["test"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-motoapp}
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-test-secret-key}

  caddy:
    image: caddy:2.10-alpine
    profiles: ["edge"]
    depends_on:
      web-prod:
        condition: service_healthy
    restart: unless-stopped
    # I-M1: Caddy can be UP while still reloading its config; healthcheck so
    # orchestrators don't route traffic prematurely.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
